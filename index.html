<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snoopy Dashboard - Modo Impresión Realista</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Happy+Monkey&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --c-verde: linear-gradient(135deg, #e3f6f2, #b5ded5);
            --c-rosa: linear-gradient(135deg, #fce5ee, #eba1bd);
            --c-naranja: linear-gradient(135deg, #ffedd8, #f5b069);
            --c-azul: linear-gradient(135deg, #e3f2fd, #90caf9);
            --border-real: #2b231a;
            --bg-corcho: #cb9b6c;
            --dot-corcho: rgba(0,0,0,0.15);
            --bg-header: linear-gradient(180deg, #ffffff 0%, #f2f0ea 100%);
            --bg-card: #ffffff;
            --text-main: #2b2b2b;
            --text-title: #3e2723;
        }

        [data-theme="dark"] {
            --c-verde: linear-gradient(135deg, #2e4d44, #1b332d);
            --c-rosa: linear-gradient(135deg, #5c2d3e, #3a1a25);
            --c-naranja: linear-gradient(135deg, #5e3b15, #3d240a);
            --c-azul: linear-gradient(135deg, #1c3d5a, #0f2336);
            --border-real: #120e0a;
            --bg-corcho: #2c251e;
            --dot-corcho: rgba(0,0,0,0.4);
            --bg-header: linear-gradient(180deg, #23272a 0%, #1a1c1e 100%);
            --bg-card: #2c2f33;
            --text-main: #f5f5f5;
            --text-title: #ffcc80;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Happy Monkey', sans-serif;
            background-color: var(--bg-corcho);
            background-image: 
                radial-gradient(var(--dot-corcho) 15%, transparent 16%),
                radial-gradient(var(--dot-corcho) 15%, transparent 16%);
            background-size: 8px 8px;
            background-position: 0 0, 4px 4px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            transition: background-color 0.3s ease;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 10px;
            background: var(--bg-header);
            border-bottom: 4px solid var(--border-real);
            height: 110px; 
            box-sizing: border-box;
            gap: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3), inset 0 -3px 0 rgba(0,0,0,0.1);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            width: 100%;
        }

        .img-principal {
            height: 38px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
            cursor: pointer;
            transition: transform 0.2s;
        }
        .img-principal:active {
            transform: scale(0.9);
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.3rem;
            color: var(--text-title);
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.2);
        }

        .header-actions {
            position: absolute;
            right: 5px;
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .btn-action {
            border: 2px solid var(--border-real);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 3px 5px rgba(0,0,0,0.3), inset 0 2px 2px rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        .btn-action:active {
            transform: scale(0.95);
        }

        .btn-print {
            background: linear-gradient(135deg, #81d4fa, #0288d1);
            font-size: 1rem;
        }

        .btn-edit-mode {
            background: linear-gradient(135deg, #b0bec5, #78909c);
        }
        .btn-edit-mode.active {
            background: linear-gradient(135deg, #ffb74d, #f57c00);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.4);
        }

        .btn-add {
            background: linear-gradient(135deg, #a5d6a7, #66bb6a);
            font-size: 1.3rem;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
            max-width: 280px;
        }

        .search-container {
            position: relative;
            flex-grow: 1;
        }

        .search-container input {
            width: 100%;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-family: 'Happy Monkey', sans-serif;
            border: 2px solid var(--border-real);
            border-radius: 20px;
            outline: none;
            background-color: var(--bg-card);
            color: var(--text-main);
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        .img-secundaria {
            height: 28px;
            width: auto;
            object-fit: contain;
        }

        main {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(4, 1fr);    
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
            height: calc(100% - 110px);
        }

        .month-card {
            background: var(--bg-card);
            background-image: linear-gradient(rgba(0, 0, 0, 0.02) 1px, transparent 1px);
            background-size: 100% 16px;
            border: 1px solid rgba(0,0,0,0.15);
            border-bottom: 3px solid rgba(0,0,0,0.25);
            border-radius: 4px;
            box-shadow: 2px 4px 6px rgba(0,0,0,0.3);
            padding: 5px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transform: rotate(calc(var(--rotation, 0deg)));
        }

        .month-header {
            padding: 3px;
            text-align: center;
            font-weight: 600;
            font-size: 0.72rem;
            border: 1px solid rgba(0,0,0,0.15);
            margin-bottom: 4px;
            font-family: 'Fredoka', sans-serif;
            text-transform: uppercase;
            box-shadow: 0 2px 3px rgba(0,0,0,0.1);
        }

        .bg-v { background: var(--c-verde); color: #2e4d44; }
        [data-theme="dark"] .bg-v { color: #a5d6a7; }
        .bg-r { background: var(--c-rosa); color: #5c2d3e; }
        [data-theme="dark"] .bg-r { color: #f48fb1; }
        .bg-n { background: var(--c-naranja); color: #5e3b15; }
        [data-theme="dark"] .bg-n { color: #ffcc80; }
        .bg-a { background: var(--c-azul); color: #1c3d5a; }
        [data-theme="dark"] .bg-a { color: #90caf9; }

        .birthday-list {
            list-style: none;
            overflow-y: auto; 
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;    
            gap: 6px;
            z-index: 2;
            padding: 0;
            margin: 0;
        }

        .birthday-item {
            font-size: 0.72rem; 
            font-weight: bold;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            line-height: 1.2;
            cursor: default;
            transition: transform 0.2s;
        }

        .edit-active .birthday-item {
            cursor: pointer;
            background-color: rgba(245, 124, 0, 0.1);
            border-radius: 4px;
            padding: 2px 0;
        }
        .edit-active .birthday-item:hover {
            transform: scale(1.05);
        }

        .birthday-item .name-label {
            display: block;
            width: 100%;
            white-space: normal; 
        }

        .birthday-item .day-label {
            font-size: 0.65rem;
            color: #888;
            font-weight: normal;
            margin-top: 1px;
        }

        .no-birthdays {
            font-style: italic;
            color: #b0b0b0;
            text-align: center;
            font-size: 0.65rem;
        }

        .gif-mes {
            position: absolute;
            bottom: 3px;
            right: 3px;
            width: 32px; 
            height: 32px; 
            object-fit: contain;
            z-index: 1;
            opacity: 0.5; 
            pointer-events: none;
            filter: drop-shadow(1px 1px 1px rgba(255,255,255,0.3));
        }

        .month-card::before {
            content: '';
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: radial-gradient(circle at 3px 3px, #ff1744, #b71c1c);
            border-radius: 50%;
            box-shadow: 0 2px 3px rgba(0,0,0,0.4);
            z-index: 5;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
            z-index: 10;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--bg-card);
            color: var(--text-main);
            border: 3px solid var(--border-real);
            border-radius: 14px;
            padding: 18px;
            width: 85%;
            max-width: 290px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .modal-content h3 {
            font-family: 'Fredoka', sans-serif;
            margin-bottom: 12px;
            font-size: 1.15rem;
            text-align: center;
            color: var(--text-title);
        }

        .modal-content label {
            font-size: 0.78rem;
            display: block;
            margin-top: 8px;
            font-weight: bold;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 7px;
            margin-top: 3px;
            border: 2px solid var(--border-real);
            border-radius: 6px;
            font-family: 'Happy Monkey', sans-serif;
            font-size: 0.85rem;
            background: var(--bg-card);
            color: var(--text-main);
            box-sizing: border-box;
        }

        .modal-buttons {
            display: flex;
            gap: 6px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .modal-buttons button {
            flex: 1;
            padding: 8px;
            border: 2px solid var(--border-real);
            border-radius: 6px;
            font-weight: bold;
            font-family: 'Happy Monkey', sans-serif;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .btn-save { background: linear-gradient(135deg, #a5d6a7, #66bb6a); color: #1b5e20; }
        .btn-cancel { background: linear-gradient(135deg, #f5f5f5, #e0e0e0); color: #333; }
        .btn-delete { background: linear-gradient(135deg, #ef9a9a, #ef5350); color: #7f0000; display: none; width: 100%; flex-basis: 100%; margin-top: 5px;}

        /* ==========================================================================
           🎨 ESTILOS MÁGICOS DE IMPRESIÓN (FORZAR VISTA DE DISEÑO EN PAPEL/PDF)
           ========================================================================== */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            
            /* Ocultar elementos de control innecesarios */
            .search-wrapper,
            .header-actions,
            .modal,
            .btn-edit-item,
            #toggleDarkMode {
                display: none !important;
            }

            /* Reajustar el cuerpo y el fondo del corcho */
            html, body {
                overflow: visible !important;
                height: auto !important;
                background-color: var(--bg-corcho) !important;
            }

            header {
                height: auto !important;
                box-shadow: none !important;
                padding: 15px 0 !important;
                border-bottom: 4px solid var(--border-real) !important;
            }

            h1 {
                font-size: 2rem !important;
            }

            /* Estructura perfecta de la cuadrícula en la hoja */
            main {
                display: grid !important;
                grid-template-columns: repeat(3, 1fr) !important;
                grid-template-rows: repeat(4, 1fr) !important;
                gap: 15px !important;
                padding: 20px !important;
                height: calc(100vh - 120px) !important;
                page-break-inside: avoid !important;
            }

            /* Evitar cortes extraños en las notas impresas */
            .month-card {
                page-break-inside: avoid !important;
                break-inside: avoid !important;
                box-shadow: 2px 4px 6px rgba(0,0,0,0.3) !important;
                border: 1px solid rgba(0,0,0,0.15) !important;
            }
            
            .birthday-list {
                overflow: visible !important;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <img class="img-principal" id="toggleDarkMode" src="https://i.postimg.cc/JhKshN9v/1c190cbf46871b36fdeaae3c2b1dfb27.gif" alt="Snoopy DarkMode">
            <h1>Cumpleaños</h1>
            <div class="header-actions">
                <!-- 🖨️ Nuevo Botón de Impresión Estilizada -->
                <button class="btn-action btn-print" id="printBtn" title="Imprimir Tablero">🖨️</button>
                <button class="btn-action btn-edit-mode" id="toggleEditModeBtn" title="Modo Editar">✏️</button>
                <button class="btn-action btn-add" id="openModalBtn" title="Agregar">+</button>
            </div>
        </div>
        
        <div class="search-wrapper">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Buscar nombre o mes...">
            </div>
            <img class="img-secundaria" src="https://i.postimg.cc/NGZkYt8W/5bbf6dd3b61a504eeccb0bee32099215.gif" alt="Snoopy Buscador">
        </div>
    </header>

    <main id="calendarGrid">
        <!-- Contenido dinámico -->
    </main>

    <!-- Modal Formulario -->
    <div class="modal" id="birthdayModal">
        <div class="modal-content">
            <h3 id="modalTitle">🎉 Agregar Cumpleaños</h3>
            <form id="birthdayForm">
                <input type="hidden" id="editIndex">
                <input type="hidden" id="editMonthId">

                <label for="inputName">Nombre:</label>
                <input type="text" id="inputName" required placeholder="Ej. Juan">

                <label for="selectMonth">Mes:</label>
                <select id="selectMonth" required>
                    <option value="enero">Enero</option>
                    <option value="febrero">Febrero</option>
                    <option value="marzo">Marzo</option>
                    <option value="abril">Abril</option>
                    <option value="mayo">Mayo</option>
                    <option value="junio">Junio</option>
                    <option value="julio">Julio</option>
                    <option value="agosto">Agosto</option>
                    <option value="septiembre">Septiembre</option>
                    <option value="octubre">Octubre</option>
                    <option value="noviembre">Noviembre</option>
                    <option value="diciembre">Diciembre</option>
                </select>

                <label for="inputDay">Día:</label>
                <input type="number" id="inputDay" min="1" max="31" required placeholder="Ej. 15">

                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" id="closeModalBtn">Cancelar</button>
                    <button type="submit" class="btn-save">Guardar</button>
                    <button type="button" class="btn-delete" id="deleteBtn">Eliminar Cumpleaños</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const defaultData = [
            { id: "enero", name: "Enero", style: "bg-v", gif: "https://i.postimg.cc/FRmVMVjz/giphy.gif", rot: "-1.5deg", list: [] },
            { id: "febrero", name: "Febrero", style: "bg-r", gif: "https://i.postimg.cc/kGYNtrL7/source.gif", rot: "1deg", list: [{ name: "Noelia", day: 19 }, { name: "Vanessa", day: 20 }] },
            { id: "marzo", name: "Marzo", style: "bg-n", gif: "https://i.postimg.cc/WbK6NvMH/47284d9e1a5fb34fb81ef770a3c54ed3.gif", rot: "-1deg", list: [{ name: "Giannina", day: 15 }, { name: "Delia", day: 21 }] },
            { id: "abril", name: "Abril", style: "bg-n", gif: "https://i.postimg.cc/FKbjVkwc/200.gif", rot: "1.5deg", list: [{ name: "Dina", day: 30 }] },
            { id: "mayo", name: "Mayo", style: "bg-r", gif: "https://i.postimg.cc/kGYNtrL7/source.gif", rot: "-2deg", list: [] },
            { id: "junio", name: "Junio", style: "bg-v", gif: "https://i.postimg.cc/FRmVMVjz/giphy.gif", rot: "1.2deg", list: [] },
            { id: "julio", name: "Julio", style: "bg-r", gif: "https://i.postimg.cc/WbK6NvMH/47284d9e1a5fb34fb81ef770a3c54ed3.gif", rot: "-1deg", list: [] },
            { id: "agosto", name: "Agosto", style: "bg-v", gif: "https://i.postimg.cc/FRmVMVjz/giphy.gif", rot: "2deg", list: [{ name: "Carlitos", day: 11 }, { name: "Jimena", day: 11 }] },
            { id: "septiembre", name: "Septiembre", style: "bg-n", gif: "https://i.postimg.cc/WbK6NvMH/47284d9e1a5fb34fb81ef770a3c54ed3.gif", rot: "-1.5deg", list: [] },
            { id: "octubre", name: "Octubre", style: "bg-r", gif: "https://i.postimg.cc/kGYNtrL7/source.gif", rot: "1deg", list: [] },
            { id: "noviembre", name: "Noviembre", style: "bg-n", gif: "https://i.postimg.cc/FKbjVkwc/200.gif", rot: "-1.2deg", list: [] },
            { id: "diciembre", name: "Diciembre", style: "bg-a", gif: "https://i.postimg.cc/FKbjVkwc/200.gif", rot: "1.8deg", list: [] }
        ];

        let birthdayData = JSON.parse(localStorage.getItem('snoopy_skeuo_birthdays')) || defaultData;
        let isEditMode = false;

        const calendarGrid = document.getElementById('calendarGrid');
        const searchInput = document.getElementById('searchInput');
        const modal = document.getElementById('birthdayModal');
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const birthdayForm = document.getElementById('birthdayForm');
        const deleteBtn = document.getElementById('deleteBtn');
        const toggleDarkMode = document.getElementById('toggleDarkMode');
        const toggleEditModeBtn = document.getElementById('toggleEditModeBtn');
        const printBtn = document.getElementById('printBtn');

        // Evento para gatillar la impresión nativa limpia
        printBtn.addEventListener('click', () => {
            window.print();
        });

        // Modo Oscuro
        toggleDarkMode.addEventListener('click', () => {
            const currentTheme = document.body.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.body.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        if (localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }

        // Modo Edición
        toggleEditModeBtn.addEventListener('click', () => {
            isEditMode = !isEditMode;
            toggleEditModeBtn.classList.toggle('active', isEditMode);
            renderCalendar(searchInput.value);
        });

        function renderCalendar(filterText = '') {
            calendarGrid.innerHTML = '';
            const search = filterText.toLowerCase().trim();

            birthdayData.forEach(month => {
                const matchesMonth = month.name.toLowerCase().includes(search);
                const filteredList = month.list.filter(person => 
                    person.name.toLowerCase().includes(search) || 
                    person.day.toString().includes(search)
                );
                
                if (search && !matchesMonth && filteredList.length === 0) return;

                const card = document.createElement('section');
                card.className = 'month-card';
                card.style.setProperty('--rotation', month.rot);

                const header = document.createElement('div');
                header.className = `month-header ${month.style}`;
                header.textContent = month.name;
                card.appendChild(header);

                const ul = document.createElement('ul');
                ul.className = 'birthday-list';
                if (isEditMode) ul.classList.add('edit-active');

                const listToDisplay = matchesMonth ? month.list : filteredList;

                if (listToDisplay.length > 0) {
                    listToDisplay.forEach((person, index) => {
                        const li = document.createElement('li');
                        li.className = 'birthday-item';
                        
                        const icon = isEditMode ? '✏️' : '🎂';
                        li.innerHTML = `
                            <span class="name-label">${icon} ${person.name}</span>
                            <span class="day-label">Día ${person.day}</span>
                        `;
                        
                        if (isEditMode) {
                            li.addEventListener('click', () => openEditModal(month.id, index));
                        }
                        
                        ul.appendChild(li);
                    });
                } else {
                    const liNo = document.createElement('li');
                    liNo.className = 'no-birthdays';
                    liNo.textContent = 'Vacío';
                    ul.appendChild(liNo);
                }
                card.appendChild(ul);

                const img = document.createElement('img');
                img.className = 'gif-mes';
                img.src = month.gif;
                card.appendChild(img);

                calendarGrid.appendChild(card);
            });
        }

        openModalBtn.addEventListener('click', () => {
            birthdayForm.reset();
            document.getElementById('editIndex').value = '';
            document.getElementById('editMonthId').value = '';
            document.getElementById('modalTitle').textContent = '🎉 Agregar Cumpleaños';
            document.getElementById('selectMonth').disabled = false;
            deleteBtn.style.display = 'none';
            modal.style.display = 'flex';
        });

        function openEditModal(monthId, index) {
            const month = birthdayData.find(m => m.id === monthId);
            const person = month.list[index];

            document.getElementById('inputName').value = person.name;
            document.getElementById('selectMonth').value = monthId;
            document.getElementById('selectMonth').disabled = true; 
            document.getElementById('inputDay').value = person.day;
            document.getElementById('editIndex').value = index;
            document.getElementById('editMonthId').value = monthId;

            document.getElementById('modalTitle').textContent = '✏️ Editar Cumpleaños';
            deleteBtn.style.display = 'block';
            modal.style.display = 'flex';
        }

        closeModalBtn.addEventListener('click', () => modal.style.display = 'none');

        birthdayForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('inputName').value;
            const monthId = document.getElementById('selectMonth').value;
            const day = parseInt(document.getElementById('inputDay').value);
            const editIndex = document.getElementById('editIndex').value;

            if (editIndex !== '') {
                const targetMonth = birthdayData.find(m => m.id === monthId);
                targetMonth.list[editIndex] = { name, day };
                targetMonth.list.sort((a, b) => a.day - b.day);
            } else {
                const targetMonth = birthdayData.find(m => m.id === monthId);
                if (targetMonth) {
                    targetMonth.list.push({ name, day });
                    targetMonth.list.sort((a, b) => a.day - b.day);
                }
            }

            localStorage.setItem('snoopy_skeuo_birthdays', JSON.stringify(birthdayData));
            
            isEditMode = false;
            toggleEditModeBtn.classList.remove('active');
            
            renderCalendar();
            modal.style.display = 'none';
        });

        deleteBtn.addEventListener('click', () => {
            const monthId = document.getElementById('editMonthId').value;
            const index = parseInt(document.getElementById('editIndex').value);

            const targetMonth = birthdayData.find(m => m.id === monthId);
            if (targetMonth && index >= 0) {
                targetMonth.list.splice(index, 1);
                localStorage.setItem('snoopy_skeuo_birthdays', JSON.stringify(birthdayData));
                
                isEditMode = false;
                toggleEditModeBtn.classList.remove('active');
                
                renderCalendar();
            }
            modal.style.display = 'none';
        });

        searchInput.addEventListener('input', (e) => renderCalendar(e.target.value));

        renderCalendar();
    </script>
</body>
</html>
