<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snoopy Birthday Mobile Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Happy+Monkey&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #fbf5eb;
            --border-color: #1a1a1a;
            --c-verde: #c6e6df;
            --c-rosa: #f5c2d5;
            --c-naranja: #f9be83;
            --c-azul: #add2e6;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Happy Monkey', sans-serif;
            background-color: var(--bg-main);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* Encabezado con espacio para el botón de agregar */
        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px 10px;
            background-color: #ffffff;
            border-bottom: 3px solid var(--border-color);
            height: 105px; 
            box-sizing: border-box;
            gap: 4px;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            width: 100%;
        }

        .img-principal {
            height: 35px;
            width: auto;
            object-fit: contain;
        }

        h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.25rem;
            color: var(--border-color);
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* Botón Añadir Cumpleaños */
        .btn-add {
            position: absolute;
            right: 5px;
            background-color: var(--c-naranja);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0px var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
            max-width: 280px;
        }

        .search-container {
            position: relative;
            flex-grow: 1;
        }

        .search-container input {
            width: 100%;
            padding: 5px 12px;
            font-size: 0.8rem;
            font-family: 'Happy Monkey', sans-serif;
            border: 2px solid var(--border-color);
            border-radius: 15px;
            outline: none;
            box-shadow: 2px 2px 0px var(--border-color);
            box-sizing: border-box;
        }

        .img-secundaria {
            height: 26px;
            width: auto;
            object-fit: contain;
        }

        /* Grid de 12 meses */
        main {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            grid-template-rows: repeat(4, 1fr);    
            gap: 6px;
            padding: 8px;
            box-sizing: border-box;
            height: calc(100% - 105px);
        }

        .month-card {
            background-color: #ffffff;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
            padding: 4px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .month-header {
            padding: 2px;
            border-radius: 4px;
            text-align: center;
            font-weight: 600;
            font-size: 0.72rem;
            border: 1.5px solid var(--border-color);
            margin-bottom: 4px;
            box-shadow: 1px 1px 0px var(--border-color);
            font-family: 'Fredoka', sans-serif;
            text-transform: uppercase;
        }

        .bg-v { background-color: var(--c-verde); }
        .bg-r { background-color: var(--c-rosa); }
        .bg-n { background-color: var(--c-naranja); }
        .bg-a { background-color: var(--c-azul); }

        /* Lista alineada de arriba hacia abajo */
        .birthday-list {
            list-style: none;
            overflow-y: auto; 
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Alineación arriba para evitar espacios en blanco extraños */
            gap: 3px;
            z-index: 2;
            padding: 2px 0;
        }

        /* Formato limpio en una sola línea */
        .birthday-item {
            font-size: 0.7rem; 
            font-weight: 600;
            padding: 1px 2px;
            display: block;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .no-birthdays {
            font-style: italic;
            color: #ccc;
            text-align: center;
            font-size: 0.62rem;
            margin-top: 12px;
        }

        .gif-mes {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 22px;
            height: 22px;
            object-fit: contain;
            z-index: 1;
            opacity: 0.35; 
            pointer-events: none;
        }

        /* Estilos del Formulario Modal (Pop-up) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 10;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            border: 3px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            width: 85%;
            max-width: 290px;
            box-shadow: 4px 4px 0px var(--border-color);
        }

        .modal-content h3 {
            font-family: 'Fredoka', sans-serif;
            margin-bottom: 10px;
            font-size: 1.1rem;
            text-align: center;
        }

        .modal-content label {
            font-size: 0.8rem;
            display: block;
            margin-top: 8px;
            font-weight: bold;
        }

        .modal-content input, .modal-content select {
            width: 100%;
            padding: 6px;
            margin-top: 3px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-family: 'Happy Monkey', sans-serif;
            font-size: 0.85rem;
            box-sizing: border-box;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 6px;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            font-weight: bold;
            font-family: 'Happy Monkey', sans-serif;
            cursor: pointer;
        }

        .btn-save { background-color: var(--c-verde); }
        .btn-cancel { background-color: var(--c-rosa); }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <img class="img-principal" src="https://i.postimg.cc/JhKshN9v/1c190cbf46871b36fdeaae3c2b1dfb27.gif" alt="Snoopy Principal">
            <h1>Cumpleaños</h1>
            <button class="btn-add" id="openModalBtn">+</button>
        </div>
        
        <div class="search-wrapper">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Buscar nombre o mes...">
            </div>
            <img class="img-secundaria" src="https://i.postimg.cc/NGZkYt8W/5bbf6dd3b61a504eeccb0bee32099215.gif" alt="Snoopy Buscador">
        </div>
    </header>

    <main id="calendarGrid">
        <!-- Render dinámico -->
    </main>

    <!-- Modal Formulario -->
    <div class="modal" id="birthdayModal">
        <div class="modal-content">
            <h3>🎉 Agregar Cumpleaños</h3>
            <form id="birthdayForm">
                <label for="inputName">Nombre:</label>
                <input type="text" id="inputName" required placeholder="Ej. Juan">

                <label for="selectMonth">Mes:</label>
                <select id="selectMonth" required>
                    <option value="enero">Enero</option>
                    <option value="febrero">Febrero</option>
                    <option value="marzo">Marzo</option>
                    <option value="abril">Abril</option>
                    <option value="mayo">Mayo</option>
                    <option value="junio">Junio</option>
                    <option value="julio">Julio</option>
                    <option value="agosto">Agosto</option>
                    <option value="septiembre">Septiembre</option>
                    <option value="octubre">Octubre</option>
                    <option value="noviembre">Noviembre</option>
                    <option value="diciembre">Diciembre</option>
                </select>

                <label for="inputDay">Día:</label>
                <input type="number" id="inputDay" min="1" max="31" required placeholder="Ej. 15">

                <div class="modal-buttons">
                    <button type="button" class="btn-cancel" id="closeModalBtn">Cancelar</button>
                    <button type="submit" class="btn-save">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Listado base de la imagen
        const defaultData = [
            { id: "enero", name: "Enero", style: "bg-v", gif: "https://i.postimg.cc/FRmVMVjz/giphy.gif", list: [] },
            { id: "febrero", name: "Febrero", style: "bg-r", gif: "https://i.postimg.cc/kGYNtrL7/source.gif", list: [{ name: "Noelia", day: 19 }, { name: "Vanessa", day: 20 }] },
            { id: "marzo", name: "Marzo", style: "bg-n", gif: "https://i.postimg.cc/WbK6NvMH/47284d9e1a5fb34fb81ef770a3c54ed3.gif", list: [{ name: "Giannina", day: 15 }, { name: "Delia", day: 21 }] },
            { id: "abril", name: "Abril", style: "bg-n", gif: "https://i.postimg.cc/FKbjVkwc/200.gif", list: [{ name: "Dina", day: 30 }] },
            { id: "mayo", name: "Mayo", style: "bg-r", gif: "https://i.postimg.cc/kGYNtrL7/source.gif", list: [] },
            { id: "junio", name: "Junio", style: "bg-v", gif: "https://i.postimg.cc/FRmVMVjz/giphy.gif", list: [] },
            { id: "julio", name: "Julio", style: "bg-r", gif: "https://i.postimg.cc/WbK6NvMH/47284d9e1a5fb34fb81ef770a3c54ed3.gif", list: [] },
            { id: "agosto", name: "Agosto", style: "bg-v", gif: "https://i.postimg.cc/FRmVMVjz/giphy.gif", list: [{ name: "Carlitos", day: 11 }, { name: "Jimena", day: 11 }] },
            { id: "septiembre", name: "Septiembre", style: "bg-n", gif: "https://i.postimg.cc/WbK6NvMH/47284d9e1a5fb34fb81ef770a3c54ed3.gif", list: [] },
            { id: "octubre", name: "Octubre", style: "bg-r", gif: "https://i.postimg.cc/kGYNtrL7/source.gif", list: [] },
            { id: "noviembre", name: "Noviembre", style: "bg-n", gif: "https://i.postimg.cc/FKbjVkwc/200.gif", list: [] },
            { id: "diciembre", name: "Diciembre", style: "bg-a", gif: "https://i.postimg.cc/FKbjVkwc/200.gif", list: [] }
        ];

        // Cargar desde LocalStorage si ya existen datos modificados, sino usar la lista por defecto
        let birthdayData = JSON.parse(localStorage.getItem('snoopy_birthdays')) || defaultData;

        const calendarGrid = document.getElementById('calendarGrid');
        const searchInput = document.getElementById('searchInput');
        const modal = document.getElementById('birthdayModal');
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const birthdayForm = document.getElementById('birthdayForm');

        function renderCalendar(filterText = '') {
            calendarGrid.innerHTML = '';
            const search = filterText.toLowerCase().trim();

            birthdayData.forEach(month => {
                const matchesMonth = month.name.toLowerCase().includes(search);
                const filteredList = month.list.filter(person => 
                    person.name.toLowerCase().includes(search) || 
                    person.day.toString().includes(search)
                );
                
                if (search && !matchesMonth && filteredList.length === 0) {
                    return; 
                }

                const card = document.createElement('section');
                card.className = 'month-card';

                const header = document.createElement('div');
                header.className = `month-header ${month.style}`;
                header.textContent = month.name;
                card.appendChild(header);

                const ul = document.createElement('ul');
                ul.className = 'birthday-list';

                const listToDisplay = matchesMonth ? month.list : filteredList;

                if (listToDisplay.length > 0) {
                    listToDisplay.forEach(person => {
                        const li = document.createElement('li');
                        li.className = 'birthday-item';
                        li.textContent = `🎂 ${person.name} (${person.day})`;
                        ul.appendChild(li);
                    });
                } else {
                    const liNo = document.createElement('li');
                    liNo.className = 'no-birthdays';
                    liNo.textContent = 'Vacío';
                    ul.appendChild(liNo);
                }
                card.appendChild(ul);

                const img = document.createElement('img');
                img.className = 'gif-mes';
                img.src = month.gif;
                img.alt = 'Snoopy';
                card.appendChild(img);

                calendarGrid.appendChild(card);
            });
        }

        // Eventos del modal
        openModalBtn.addEventListener('click', () => modal.style.display = 'flex');
        closeModalBtn.addEventListener('click', () => modal.style.display = 'none');

        birthdayForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('inputName').value;
            const monthId = document.getElementById('selectMonth').value;
            const day = parseInt(document.getElementById('inputDay').value);

            // Buscar el mes y añadir el nuevo registro
            const targetMonth = birthdayData.find(m => m.id === monthId);
            if (targetMonth) {
                targetMonth.list.push({ name, day });
                // Ordenar la lista por días automáticamente
                targetMonth.list.sort((a, b) => a.day - b.day);
                
                // Guardar en el dispositivo
                localStorage.setItem('snoopy_birthdays', JSON.stringify(birthdayData));
                renderCalendar();
            }

            birthdayForm.reset();
            modal.style.display = 'none';
        });

        searchInput.addEventListener('input', (e) => {
            renderCalendar(e.target.value);
        });

        renderCalendar();
    </script>
</body>
</html>
